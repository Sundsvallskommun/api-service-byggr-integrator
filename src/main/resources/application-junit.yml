#========================================
# Test profile settings (junit tests)
#========================================
integration:
  byggr:
    url: http://somehost.com
    connect-timeout-in-seconds: 1
    read-timeout-in-seconds: 2

file-access-token:
  expiration: PT24H
  cron: "-"

spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:mariadb:10.6:///junittest
  jpa:
    properties:
      hibernate:
        format_sql: true
        hbm2ddl:
          schema-generation:
            script:
              append: false
      jakarta:
        persistence:
          schema-generation:
            create-source: metadata
            database:
              action: update
            scripts:
              action: create
              create-target: target/database/generated-schema.sql
service:
  byggr:
    filter-util:
      applicant:
        roles:
          - SOK
          - MSOK
          - KPER
          - OMB
          - KOA
      notifications:
        unwanted-event-types:
          - UNWANTED1
          - UNWANTED2
      document-types:
        unwanted-document-types:
          - GRA
          - REMISS
          - UNDUT
neighborhood-notification-template:
  byggr-files:
    domain: http://somewhere.com/
    sub-directory: /files/
